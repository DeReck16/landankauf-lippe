<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Lippe Forst — Flächenverkauf</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #050807; height: 100%; overflow: hidden; }
  body { font-family: Inter, system-ui, sans-serif; }
  #root { position: fixed; inset: 0; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="photo-placeholder.jsx"></script>
<script type="text/babel" src="scenes-intro.jsx"></script>
<script type="text/babel" src="scenes-value.jsx"></script>
<script type="text/babel" src="scenes-vns.jsx"></script>
<script type="text/babel" src="scenes-cta.jsx"></script>

<script type="text/babel">
  function App() {
    return (
      <Stage
        width={1920}
        height={1080}
        duration={42.5}
        background="#0d1410"
        persistKey="lippe-forst-video"
      >
        {/* Persistent vignette + grain on every scene */}
        <GlobalVignette />

        <SceneIntro />
        <SceneProblem />
        <SceneHiddenValue />
        <SceneEcoPoints />
        <SceneVNS />
        <SceneFairMarket />
        <SceneNature />
        <SceneAdvisory />
        <SceneCTA />

        {/* Persistent timecode bug */}
        <TimecodeBug />
      </Stage>
    );
  }

  function GlobalVignette() {
    return (
      <div style={{
        position: 'absolute', inset: 0,
        pointerEvents: 'none',
        zIndex: 100,
        background: 'radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%)',
      }}/>
    );
  }

  function TimecodeBug() {
    const time = useTime();
    const tc = (() => {
      const m = Math.floor(time / 60);
      const s = Math.floor(time % 60);
      const f = Math.floor((time * 24) % 24);
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:${String(f).padStart(2,'0')}`;
    })();
    return (
      <div style={{
        position: 'absolute',
        top: 32, right: 32,
        fontFamily: 'JetBrains Mono, ui-monospace, monospace',
        fontSize: 11,
        letterSpacing: '0.18em',
        color: 'rgba(196, 168, 102, 0.55)',
        textTransform: 'uppercase',
        pointerEvents: 'none',
        zIndex: 101,
        display: 'flex', alignItems: 'center', gap: 10,
      }}>
        <span style={{
          width: 8, height: 8, borderRadius: '50%',
          background: '#c4a866',
          boxShadow: '0 0 8px #c4a866',
        }}/>
        REC · {tc}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
